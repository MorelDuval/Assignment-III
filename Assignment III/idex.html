<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Account</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Add Account</h1>
    <h2><p>Account Information</p></h2> 
    
<p class="subtitle">You can only select one account at a time</p>
<select class="input-field">

    <option value="Facebook">Facebook</option>
    <option value="Instagram">Instagram</option>
    <option value="Tiktok">Tiktok</option>
    <option value="Twitter">X</option> 
    <option value="WhatsApp">WhatsApp</option>

</select>
<br><br>

<div class="form-group">
<label>Name</label>
<input type="text" class="input-field" placeholder="Your Name">
<p class="hint">For e.g. 4Years Facebook account</p>
</div>

<label for="description" id="Description" class="description">Description</label><br>
<textarea name="description" class="input-field"></textarea>
<br><br>
<input type="number" class="input-field" placeholder="Enter your price">
<br><br>
<center><button>Continue</button></center>
</body>
</html>
